<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Timer circle -->
  <circle cx="256" cy="270" r="155" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="14"/>
  <circle cx="256" cy="270" r="155" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-dasharray="974" stroke-dashoffset="243" transform="rotate(-90 256 270)"/>
  <!-- Clock hands -->
  <line x1="256" y1="270" x2="256" y2="155" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="270" x2="330" y2="300" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="270" r="10" fill="white"/>
  <!-- Stem -->
  <rect x="240" y="85" width="32" height="28" rx="6" fill="white"/>
</svg>
